name: Run Home Assignment Suite

on:
  workflow_call:
    inputs:
      suite_name:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 30

permissions:
  contents: write

jobs:
  run-tests:
    name: ${{ inputs.suite_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      CI: true
      HEADLESS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore
        run: dotnet restore tests/WikiAutomation.Tests/WikiAutomation.Tests.csproj

      - name: Build
        run: dotnet build tests/WikiAutomation.Tests/WikiAutomation.Tests.csproj --no-restore

      - name: Install Playwright browser
        run: pwsh tests/WikiAutomation.Tests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run tests
        run: dotnet test tests/WikiAutomation.Tests/WikiAutomation.Tests.csproj --no-build

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: allure generate artifacts/allure-results --clean -o artifacts/allure-report

      - name: Compute hosted report URL
        if: always() && hashFiles('artifacts/allure-report/**') != ''
        id: hosted_report
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REPORT_PATH="reports/pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            REPORT_PATH="reports/main"
          else
            REPORT_PATH="reports/run-${{ github.run_id }}"
          fi

          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${REPORT_PATH}/"
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          echo "report_url=$REPORT_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy hosted Allure report
        if: >
          always() &&
          hashFiles('artifacts/allure-report/**') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./artifacts/allure-report
          destination_dir: ${{ steps.hosted_report.outputs.report_path }}
          keep_files: true

      - name: Upload Allure report artifact
        if: always() && hashFiles('artifacts/allure-report/**') != ''
        id: upload_allure_report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-allure-report
          if-no-files-found: warn
          path: artifacts/allure-report/

      - name: Upload test artifacts
        if: always()
        id: upload_test_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: warn
          path: artifacts/

      - name: Add Allure report link to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Allure Report"
            echo
            if [ -n "${{ steps.hosted_report.outputs.report_url }}" ] && [ "${{ github.event_name }}" != "pull_request" -o "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              echo "- Report here: ${{ steps.hosted_report.outputs.report_url }}"
            elif [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- Hosted report was skipped because the PR source does not have write permission to publish previews."
            fi

            if [ -n "${{ steps.upload_allure_report.outputs.artifact-url }}" ]; then
              echo "- Downloadable artifact: ${{ steps.upload_allure_report.outputs.artifact-url }}"
            else
              echo "- Report artifact was not generated for this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report here
        if: always()
        shell: bash
        run: |
          if [ -n "${{ steps.hosted_report.outputs.report_url }}" ] && [ "${{ github.event_name }}" != "pull_request" -o "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "Report here: ${{ steps.hosted_report.outputs.report_url }}"
          elif [ -n "${{ steps.upload_allure_report.outputs.artifact-url }}" ]; then
            echo "Hosted report unavailable. Download artifact here: ${{ steps.upload_allure_report.outputs.artifact-url }}"
          else
            echo "Allure report was not generated for this run."
          fi
